name: Aggregate multi-repo docs

on:
  push:
    branches: [main]
  schedule:
    # Daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: aggregate-docs
  cancel-in-progress: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Aggregate docs from subrepos
        uses: mintlify/multirepo-action@2a8d0867b0cffdafe0959d1d9c497cba48987110 # post-v0.16: docs.json tabs support
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          target-branch: docs
          repos: |
            - owner: jylhis
              repo: Marchyo
              subdirectory: docs
            - owner: jylhis
              repo: Jotain
              subdirectory: docs
            - owner: jylhis
              repo: jstack
              subdirectory: docs
